<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-friendly scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaze Web App - SPA</title>

  <!-- ✅ Preload important SVGs for faster loading -->
  <link rel="preload" href="assets/Blaze PNG 3.svg" as="image" type="image/svg+xml">
  <link rel="preload" href="assets/moving_frame.svg" as="image" type="image/svg+xml">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ✅ INLINE LOGO SVG (No extra request, loads instantly) -->
  <header class="top-bar">
    <a href="#home" class="logo-link">
      <svg class="logo" width="100" height="50" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <text x="10" y="35" font-size="35" font-family="Arial" fill="gold">BLAZE</text>
      </svg>
    </a>

    <h1 class="title">
      <span class="dash">-</span>
      <span class="gold-text">FLAVOURS</span>
      <span class="black-text">THAT</span>
      <span class="gold-text">FLIRT</span>
      <span class="dash">-</span>
    </h1>

    <!-- HAMBURGER ICON -->
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- SIDE NAVIGATION -->
  <nav class="side-nav">
    <ul>
      <li><a href="#home">HOME</a></li>
      <li><a href="#hours-location">HOURS &amp; LOCATION</a></li>
      <li><a href="#about">ABOUT</a></li>
      <li><a href="#order-online">ORDER ONLINE</a></li>
      <li><a href="tel:+919711313434">(+91) 9711313434</a></li>
      <li><a href="#contact">CONTACT</a></li>
    </ul>
    <hr />
    <div class="powered-by">POWERED BY TEAM RENT &amp; RIDE</div>
    <div class="side-nav-buttons">
      <button class="order-btn">ORDER ONLINE</button>
      <button class="call-btn">CALL (+91) 9711313434</button>
    </div>
  </nav>

  <!-- ✅ INLINE MARQUEE SVG (Loads instantly) -->
  <div class="marquee-container">
    <div class="marquee">
      <svg class="marquee-img" width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
        <text x="10" y="35" font-size="30" font-family="Arial" fill="black">MOVING FRAME</text>
      </svg>
      <svg class="marquee-img" width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
        <text x="10" y="35" font-size="30" font-family="Arial" fill="black">MOVING FRAME</text>
      </svg>
    </div>
  </div>

  <!-- MAIN CONTENT AREA (SPA partials load here) -->
  <main id="app"></main>

  <!-- ✅ Defer JavaScript for better performance -->
  <script defer src="script.js"></script>

</body>
</html>
