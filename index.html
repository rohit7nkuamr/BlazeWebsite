<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-friendly scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaze Web App - SPA</title>

  <!-- ✅ Preload important SVGs for instant rendering -->
  <link rel="preload" href="assets/Blaze PNG 3.svg" as="image" type="image/svg+xml">
  <link rel="preload" href="assets/moving_frame.svg" as="image" type="image/svg+xml">

  <!-- ✅ Preload fonts (if using custom fonts) -->
  <link rel="preload" href="fonts/your-font.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="top-bar">
    <!-- ✅ Fast Loading Logo -->
    <a href="#home" class="logo-link">
      <img src="assets/Blaze PNG 3.svg" alt="Blaze Logo" class="logo" width="150" height="auto" />
    </a>

    <h1 class="title">
      <span class="dash">-</span>
      <span class="gold-text">FLAVOURS</span>
      <span class="black-text">THAT</span>
      <span class="gold-text">FLIRT</span>
      <span class="dash">-</span>
    </h1>

    <!-- HAMBURGER ICON -->
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- SIDE NAVIGATION -->
  <nav class="side-nav">
    <ul>
      <li><a href="#home">HOME</a></li>
      <li><a href="#hours-location">HOURS &amp; LOCATION</a></li>
      <li><a href="#about">ABOUT</a></li>
      <li><a href="#order-online">ORDER ONLINE</a></li>
      <li><a href="tel:+919711313434">(+91) 9711313434</a></li>
      <li><a href="#contact">CONTACT</a></li>
    </ul>
    <hr />
    <div class="powered-by">POWERED BY TEAM RENT &amp; RIDE</div>
    <div class="side-nav-buttons">
      <button class="order-btn">ORDER ONLINE</button>
      <button class="call-btn">CALL (+91) 9711313434</button>
    </div>
  </nav>

  <!-- ✅ Optimized Marquee (Preloaded SVGs) -->
  <div class="marquee-container">
    <div class="marquee">
      <img src="assets/moving_frame.svg" alt="Marquee" class="marquee-img" width="200" height="auto" />
      <img src="assets/moving_frame.svg" alt="Marquee" class="marquee-img" width="200" height="auto" />
    </div>
  </div>

  <!-- MAIN CONTENT AREA (SPA partials load here) -->
  <main id="app"></main>

  <!-- ✅ Defer JavaScript for non-blocking rendering -->
  <script defer src="script.js"></script>

  <!-- ✅ Register Service Worker for faster loading -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker Registered:', reg.scope))
          .catch(err => console.log('Service Worker Registration Failed:', err));
      });
    }
  </script>

</body>
</html>
